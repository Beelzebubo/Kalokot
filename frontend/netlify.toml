[build]
  command = "npm run build"
  publish = ".output/public"
  functions = ".output/server"

# API proxy — routes /api/* requests to the backend (Railway/Fly.io)
# Replace YOUR_BACKEND_URL with your deployed backend address
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_URL/api/:splat"
  status = 200

# All other routes → SSR function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
