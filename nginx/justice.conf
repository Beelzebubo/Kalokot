# Justice_system — Nginx Reverse Proxy
# -------------------------------------------------------
# For HTTPS: replace YOUR_DOMAIN, uncomment SSL block, run:
#   sudo certbot --nginx -d YOUR_DOMAIN
# -------------------------------------------------------

# HTTP → HTTPS redirect (uncomment server_name after setting up SSL)
server {
    listen 80;
    server_name justice.local;  # ← change to your domain

    server_tokens off;
    client_max_body_size 50M;

    # Uncomment after SSL is configured:
    # return 301 https://$server_name$request_uri;
}

