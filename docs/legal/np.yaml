red_flags:
  # ── Timeline Violations ──────────────────────────────────────────
  - id: timeline-too-short
    label: "Suspiciously Short Timeline"
    severity: critical
    description: "Bid submission period appears unusually short, limiting competition."
    section: timeline
    rules:
      national_min_days: 14
      international_min_days: 40
      emergency_min_days: 7
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§4.1(a)"
      reg: "PPMO Regulations 2068"
      reg_section: "Regulation 12(1)"
      text: "The procuring entity shall allow a minimum of 14 days for national competitive bidding and 40 days for international competitive bidding from the date of publication of the invitation for bids."
    penalty: "Procurement may be invalidated upon complaint. Officials may face departmental action under §62."
    action:
      what: "File a complaint with PPMO or CIAA challenging the shortened timeline."
      deadline: "Within 7 days of bid submission deadline"
      template: "complaint_ppmo"
      evidence:
        - "Screenshot of tender publication date"
        - "Screenshot of submission deadline"
        - "Normal timeline standard from PPMO guidelines"
    oversight: PPMO

  - id: emergency-keywords
    label: "Emergency Procurement Without Justification"
    severity: critical
    description: "Emergency/direct procurement mentioned without explanation of the emergency."
    section: details
    rules:
      valid_emergency: ["natural disaster", "public health emergency", "security threat", "force majeure"]
      publication_deadline_days: 7
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§5.2(b)"
      reg: "PPMO Regulations 2068"
      reg_section: "Regulation 15"
      text: "Emergency procurement may only be used in cases of genuine emergency such as natural disasters, public health emergencies, or security threats. The procuring entity must publish a formal justification within 7 days."
    penalty: "Officials may be personally liable for losses from unjustified emergency procurement (§62). Criminal prosecution under Anti-Corruption Act 2019 §18."
    action:
      what: "File a complaint with CIAA for unjustified emergency procurement."
      deadline: "Within 35 days of the emergency procurement notice"
      template: "complaint_ciaa"
      evidence:
        - "Copy of the emergency procurement notice"
        - "Any published justification"
        - "Proof that no genuine emergency existed (news reports, official statements)"
    oversight: CIAA

  # ── Specification Violations ─────────────────────────────────────
  - id: single-brand-spec
    label: "Single Brand / Tailored Specification"
    severity: high
    description: "Technical specifications reference a specific brand, model, or appear tailored to one supplier."
    section: specification
    rules:
      min_alternatives: 3
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§6.2"
      reg: "PPMO Regulations 2068"
      reg_section: "Regulation 20"
      text: "Technical specifications shall be generic and performance-based. Brand-specific specifications are prohibited unless justified and accompanied by 'or equivalent' language. At least three equivalent products must be identifiable."
    penalty: "Procurement may be annulled. Officials liable for disciplinary action."
    action:
      what: "Report tailored specifications to PPMO for review."
      deadline: "Before bid opening"
      template: "complaint_ppmo"
      evidence:
        - "Brand/model names in the specification section"
        - "Market research showing available alternatives"
        - "Past tender documents for comparison"
    oversight: PPMO

  - id: vague-spec
    label: "Vague or Copy-Pasted Specifications"
    severity: medium
    description: "Technical specs are vague, generic, or appear copy-pasted from another document."
    section: specification
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§6.1"
      text: "Specifications must be clear, precise, and complete to enable fair competition."
    action:
      what: "Request clarification from the procuring entity under §8 of the Act."
      deadline: "Within half the bid submission period"
      evidence:
        - "The vague/conflicting specification text"
        - "Clarification request"
    oversight: PPMO

  # ── Budget Violations ────────────────────────────────────────────
  - id: budget-inflation
    label: "Potential Budget Inflation"
    severity: medium
    description: "Budget data shows potential inflation indicators: vague cost breakdown, no rate analysis, round numbers."
    section: budget
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§10.2"
      reg: "PPMO Regulations 2068"
      reg_section: "Regulation 25"
      text: "The estimated cost must be based on a detailed rate analysis with current market rates. Cost breakdowns shall include materials, labor, equipment, overhead, and profit."
    penalty: "Officials may be surcharged for inflated estimates."
    action:
      what: "Request detailed cost breakdown under RTI Act."
      deadline: "Before contract award"
      template: "rti_request"
      evidence:
        - "Published estimated cost"
        - "Market rate research"
        - "Comparison with similar projects"
    oversight: OAG

  # ── Evaluation Criteria Violations ───────────────────────────────
  - id: opaque-evaluation
    label: "Vague Evaluation Criteria"
    severity: high
    description: "Evaluation criteria are missing, vague, or use subjective language."
    section: evaluation_criteria
    rules:
      required_elements: ["weight", "score", "methodology", "threshold"]
      min_technical_weight: 30
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§11.1"
      reg: "PPMO Regulations 2068"
      reg_section: "Regulation 28"
      text: "Evaluation criteria must be published in the bid document and include technical and financial weights, minimum qualifying scores, and the evaluation methodology. QCBS (Quality and Cost Based Selection) shall have a minimum technical weight of 30%."
    penalty: "Evaluation results may be invalidated. Re-tendering may be ordered."
    action:
      what: "File a complaint with PPMO challenging the evaluation methodology."
      deadline: "Within 7 days of bid submission deadline"
      template: "complaint_ppmo"
      evidence:
        - "Evaluation criteria section from the tender"
        - "Lack of scoring weights or methodology"
    oversight: PPMO

  - id: missing-evaluation-section
    label: "No Evaluation Criteria Section"
    severity: critical
    description: "No evaluation methodology published — impossible to verify fair award."
    section: evaluation_criteria
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§11.1"
      text: "Every tender must include detailed evaluation criteria. Failure to publish criteria is a serious procedural violation."
    penalty: "Procurement is voidable. Officials face departmental action."
    action:
      what: "Immediately file a complaint with PPMO."
      deadline: "Before bid opening"
      template: "complaint_ppmo"
      evidence:
        - "The entire tender document showing no evaluation criteria"
    oversight: PPMO

  # ── Terms Violations ─────────────────────────────────────────────
  - id: conflict-interest-signals
    label: "Potential Conflict of Interest Signals"
    severity: high
    description: "No conflict of interest or recusal provisions found in terms."
    section: terms_and_conditions
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§15"
      text: "Officials involved in procurement shall declare any conflict of interest and recuse themselves. Bid evaluation committee members must sign a declaration of no conflict."
    penalty: "Procurement decisions voidable. Criminal liability under Anti-Corruption Act §19."
    action:
      what: "Report suspected conflict of interest to CIAA."
      deadline: "Any time"
      template: "complaint_ciaa"
      evidence:
        - "Names of evaluation committee members"
        - "Relationships with bidders (if known)"
        - "Company registration details of winning bidder"
    oversight: CIAA

  - id: unusual-contract-terms
    label: "Unusual or One-Sided Contract Terms"
    severity: medium
    description: "Contract terms appear unusually favorable to contractor or lack standard safeguards."
    section: terms_and_conditions
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§14"
      text: "Standard contract terms shall include penalty clauses for delay, performance guarantees, and inspection rights. Any deviation requires PPMO approval."
    action:
      what: "Request review by PPMO of the contract terms."
      deadline: "Before contract signing"
      evidence:
        - "The contract terms section"
        - "Standard PPMO model contract for comparison"
    oversight: PPMO

  # ── Integrity Violations ─────────────────────────────────────────
  - id: bid-splitting
    label: "Procurement Splitting (Avoiding Threshold)"
    severity: critical
    description: "Multiple small procurements from the same entity that appear designed to avoid higher-level approval thresholds."
    section: details
    rules:
      threshold_national: 50000000  # NPR 5 crore
      threshold_province: 20000000
      threshold_local: 5000000
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§4.2"
      text: "Procurement shall not be split to avoid applicable approval thresholds or bidding requirements. The total value of related procurements shall determine the applicable procedure."
    penalty: "Officials personally liable for excess costs. Criminal prosecution for corruption."
    action:
      what: "Report suspected procurement splitting to CIAA."
      deadline: "Within 35 days"
      template: "complaint_ciaa"
      evidence:
        - "List of multiple contracts awarded around same time"
        - "Same contractor/entity receiving multiple awards"
        - "Total value exceeding normal threshold"
    oversight: CIAA

  - id: single-bidder-award
    label: "Single Bidder / No Competition"
    severity: high
    description: "Only one bidder submitted or only one bid was considered responsive."
    section: evaluation_criteria
    rules:
      min_bidders: 3
    law_reference:
      act: "Public Procurement Act 2063"
      section: "§12"
      reg: "PPMO Regulations 2068"
      reg_section: "Regulation 30"
      text: "At least three bids shall be received for open competitive bidding. If fewer than three, the procuring entity must justify and may seek PPMO approval for alternative procurement method."
    penalty: "Contract may be cancelled. Re-tendering may be ordered."
    action:
      what: "Request details of bidder participation from procuring entity."
      deadline: "Within 7 days of bid opening"
      template: "rti_request"
      evidence:
        - "Bid opening minutes showing number of bidders"
        - "List of invited bidders"
    oversight: PPMO

  - id: shell-company-bidder
    label: "Suspicious Bidder / Shell Company"
    severity: high
    description: "Winning bidder appears to be a newly registered company, shell entity, or politically connected."
    section: details
    law_reference:
      act: "Company Act 2063"
      section: "§6, §8"
      text: "Companies must have genuine business operations and disclose beneficial ownership. Shell companies used for bid rigging violate procurement integrity."
    penalty: "Contract cancellation. Criminal prosecution for fraud."
    action:
      what: "Cross-reference company registry at Company Registrar Office."
      deadline: "Within 35 days of contract award"
      evidence:
        - "Company registration number"
        - "Director names and background"
        - "Shareholder registration details"
        - "Past contract history with government"
    oversight: CIAA

templates:
  - id: complaint_ciaa
    template_name: complaint_ciaa
    title: "Complaint to Commission for Investigation of Abuse of Authority (CIAA)"
    filing_body: CIAA
    subject_tags:
      - corruption
      - procurement
      - irregularity
      - ciaa
    body: |-
      DATE: [dd/mm/yyyy]
      TO: The Honorable Chief Commissioner
      Commission for Investigation of Abuse of Authority
      Tangal, Kathmandu, Nepal

      RE: COMPLAINT REGARDING PROCUREMENT IRREGULARITY — [Tender Reference Number]

      RESPECTED CHIEF COMMISSIONER,

      I, [Complainant Name], a citizen of Nepal residing at [Address],
      hereby submit this complaint under Section [applicable section] of
      the Anti-Corruption Act 2019 regarding serious irregularities in
      the following procurement:

      1. DETAILS OF PROCUREMENT
         Procuring Entity: [Name of Entity]
         Tender Reference: [Reference Number]
         Tender Title: [Title]
         Estimated Value: NPR [Amount]
         Publication Date: [Date]
         Bid Submission Deadline: [Date]

      2. NATURE OF IRREGULARITY
         [Describe the specific violation — e.g., shortened timeline,
         single-brand specification, inflated budget, etc.]

      3. LEGAL PROVISIONS VIOLATED
         [Cite specific Act, Section, and Regulation]

      4. EVIDENCE IN MY POSSESSION
         [List documents, screenshots, or other evidence attached]

      5. URGENCY / PUBLIC INTEREST
         [Explain why this matter requires immediate attention]

      6. RELIEF SOUGHT
         I humbly request the Commission to:
         a) Investigate the above procurement process
         b) Suspend the procurement/award pending investigation
         c) Take appropriate action against responsible officials
         d) [Other specific requests]

      I submit this complaint in good faith and am prepared to provide
      further information as required.

      DECLARATION: I understand that making a false complaint is
      punishable under law. The information provided herein is true
      to the best of my knowledge and belief.

      Sincerely,

      [Complainant Name]
      [Phone Number]
      [Email Address]

      ENCLOSURES:
      1. [List attached documents]
      2. [Evidence items]
      3. [Any other relevant materials]

  - id: complaint_ppmo
    template_name: complaint_ppmo
    title: "Complaint to Public Procurement Monitoring Office (PPMO)"
    filing_body: PPMO
    subject_tags:
      - procurement
      - bid
      - tender
      - ppmo
    body: |-
      DATE: [dd/mm/yyyy]
      TO: The Spokesperson / Secretary
      Public Procurement Monitoring Office
      Singh Durbar, Kathmandu, Nepal

      RE: COMPLAINT UNDER PPMO REGULATIONS 2068 — Procurement
          Irregularity in [Tender Reference Number]

      RESPECTED SIR/MADAM,

      I, [Complainant Name], wish to bring to your attention serious
      procedural irregularities in the above-referenced procurement
      conducted by [Procuring Entity].

      1. TENDER DETAILS
         Reference: [Reference Number]
         Title: [Title]
         Procuring Entity: [Name]
         Estimated Value: NPR [Amount]

      2. DESCRIPTION OF VIOLATION
         [Describe the specific procurement rule violation — e.g.,
         insufficient timeline, missing evaluation criteria,
         restrictive specifications, etc.]

      3. APPLICABLE LEGAL STANDARD
         [Cite the PPMO Regulation violated]
         [Quote/link the relevant requirement]

      4. HOW THE STANDARD WAS VIOLATED
         [Specific explanation of what the procuring entity did
         or failed to do]

      5. REQUEST FOR ACTION
         I request PPMO to:
         a) Review the procurement documents for compliance
         b) Direct the procuring entity to rectify the violation
         c) If rectification is impossible, recommend re-tendering
         d) [Other specific requests]

      This complaint is filed under the right to seek review of
      procurement decisions under PPMO Regulations 2068.

      Truthfully,

      [Complainant Name]
      [Phone/Email]

      ATTACHMENTS:
      [List supporting documents]

  - id: rti_request
    template_name: rti_request
    title: "Right to Information Request"
    filing_body: "Relevant Public Body"
    subject_tags:
      - rti
      - information
      - transparency
      - disclosure
    body: |-
      DATE: [dd/mm/yyyy]
      TO: Chief Information Officer
      [Name of Public Body]
      [Address]

      RE: REQUEST FOR INFORMATION UNDER RIGHT TO INFORMATION ACT 2064

      Dear Sir/Madam,

      Pursuant to Section [3/4/5] of the Right to Information Act 2064,
      I request access to the following information/documents related
      to [Tender Reference Number]:

      INFORMATION REQUESTED:
      1. The detailed cost estimate/rate analysis for the project
      2. Bid evaluation report with scores for each bidder
      3. Minutes of the bid evaluation committee meetings
      4. The contract agreement signed with the successful bidder
      5. [Any other specific documents]

      FORMAT REQUESTED: Certified copies (Section 11 of the RTI Act)

      I require this information for the purpose of ensuring
      transparency in public procurement. I understand that the
      information may be exempt from disclosure only under Section 3
      of the RTI Act.

      Please provide the information within 15 days as required by
      Section 7(1) of the RTI Act 2064. If the request is denied,
      please provide the specific exemption provision and reasons
      in writing.

      Sincerely,

      [Requestor Name]
      [Address]
      [Phone Number]
      [Email]

  - id: appeal_review_committee
    template_name: appeal_review_committee
    title: "Appeal to Review Committee"
    filing_body: "Review Committee (PPMO)"
    subject_tags:
      - appeal
      - review
      - procurement
      - dispute
    body: |-
      DATE: [dd/mm/yyyy]
      TO: The Chairperson
      Review Committee
      Public Procurement Monitoring Office
      Singh Durbar, Kathmandu

      RE: APPEAL UNDER SECTION 49 OF PUBLIC PROCUREMENT ACT 2063 —
          [Tender Reference Number]

      RESPECTED CHAIRPERSON,

      I, [Appellant Name/Company Name], hereby submit this appeal
      against the decision of [Procuring Entity] dated [Date] regarding
      [Tender Reference].

      GROUNDS OF APPEAL:
      1. [First ground: e.g., wrongful disqualification]
      2. [Second ground: e.g., evaluation criteria not followed]
      3. [Third ground: e.g., bias in evaluation]

      RELIEF SOUGHT:
      [Specific remedy requested — e.g., re-evaluation, compensation]

      I submit this appeal within the statutory time limit under
      Section 49(2) of the Public Procurement Act 2063.

      [Appellant Name]
      [Signature]
      [Contact Details]

  # ═══════════════════════════════════════════════════════════════
  # NEW NEPAL COMPLAINT TEMPLATES (12+)
  # ═══════════════════════════════════════════════════════════════

  # ── 1. Consumer Rights (Department of Commerce) ──
  - id: complaint_consumer_doc
    template_name: complaint_consumer_doc
    title: "Complaint to Department of Commerce — Consumer Rights Violation"
    filing_body: "Department of Commerce, Ministry of Industry, Commerce and Supplies"
    subject_tags:
      - consumer rights
      - goods defect
      - services deficiency
      - consumer protection
      - Department of Commerce
    body: |-
      DATE: [dd/mm/yyyy]
      TO: The Director General
      Department of Commerce
      Ministry of Industry, Commerce and Supplies
      Singh Durbar, Kathmandu, Nepal

      RE: COMPLAINT REGARDING CONSUMER RIGHTS VIOLATION — [Invoice/Receipt No./Reference]

      RESPECTED SIR/MADAM,

      I, [Complainant Name], a consumer residing at [Address], do hereby
      lodge this complaint under the Consumer Protection Act 2075 (2018)
      regarding a defect/deficiency in goods/services purchased from
      [Name of Seller/Service Provider].

      1. DETAILS OF PURCHASE
         Purchased Item / Service: [Description]
         Date of Purchase: [dd/mm/yyyy]
         Amount Paid: NPR [Amount]
         Invoice / Receipt No.: [Number]
         Seller / Provider Name: [Name]
         Seller / Provider Address: [Full Address]

      2. NATURE OF DEFECT / DEFICIENCY
         [Describe the defect in goods or deficiency in service in
         detail — e.g., manufacturing defect, expiry date issue,
         poor quality, short weight/measurement, false advertisement,
         overcharging, etc.]

      3. ATTEMPT TO RESOLVE WITH SELLER
         [Describe any communication with the seller/provider and
         their response or failure to resolve the issue]

      4. LEGAL PROVISIONS
         This violation contravenes the Consumer Protection Act 2075,
         particularly Sections [specify sections, e.g., §5 — right to
         safety, §6 — right to information, §7 — right to redressal].

      5. RELIEF SOUGHT
         I respectfully request the Department to:
         a) Investigate the above-mentioned complaint
         b) Direct the seller/provider to replace/repair the goods
            or refund the amount paid
         c) Take appropriate action against the seller/provider under
            the Consumer Protection Act 2075
         d) Award compensation for the loss and inconvenience suffered

      EVIDENCE ENCLOSED:
      1. Copy of invoice/receipt
      2. Photographs of defective goods (if applicable)
      3. Correspondence with seller/provider
      4. [Any other relevant documents]

      I submit this complaint in good faith and am prepared to provide
      further information as required.

      Sincerely,

      [Complainant Name]
      [Phone Number]
      [Email Address]
      [Full Address]

  # ── 2. Banking / Finance (Nepal Rastra Bank) ──
  - id: complaint_banking_nrb
    template_name: complaint_banking_nrb
    title: "Complaint to Nepal Rastra Bank — Banking and Financial Service Deficiency"
    filing_body: "Nepal Rastra Bank (NRB), Banking Sector Supervision Department"
    subject_tags:
      - banking
      - finance
      - NRB
      - bank complaint
      - financial services
      - loan
    body: |-
      DATE: [dd/mm/yyyy]
      TO: The Governor / The Chief, Banking Sector Supervision Department
      Nepal Rastra Bank (NRB)
      Central Office, Baluwatar
      Kathmandu, Nepal

      RE: COMPLAINT REGARDING BANKING SERVICE DEFICIENCY — [Bank Name/Branch]

      RESPECTED SIR/MADAM,

      I, [Complainant Name], a customer of [Bank Name], [Branch],
      having account number [Account No.], hereby submit this complaint
      under the Nepal Rastra Bank Act 2058 and related directives
      regarding the following banking service deficiency.

      1. BANK DETAILS
         Bank Name: [Name of Bank]
         Branch: [Branch Name and Location]
         Account Type: [Savings/Current/Loan/Fixed Deposit]
         Account Number: [Account Number]

      2. NATURE OF COMPLAINT
         [Describe the issue — e.g., unauthorised deduction from
         account, delay in loan processing, excessive charges not
         disclosed, wrongful freezing of account, non-payment of
         matured deposit, ATM/debit card fraud, harassment by
         recovery agents, etc.]

      3. ATTEMPT TO RESOLVE WITH BANK
         [Describe the complaint lodged with the bank's grievance
         officer / branch manager, date of complaint, response
         received (if any), and the bank's failure to resolve]

      4. PROVISIONS VIOLATED
         [Cite relevant NRB unified directives or Nepal Rastra Bank
         Act provisions — e.g., Directive No. [X] on interest rate,
         Directive on Customer Protection, Section [Y] of NRB Act]

      5. RELIEF SOUGHT
         I humbly request Nepal Rastra Bank to:
         a) Direct the bank to rectify the deficiency immediately
         b) Restore/credit the amount wrongfully deducted/withheld
         c) Impose appropriate penalties on the bank for non-compliance
         d) Award compensation for financial loss and harassment

      EVIDENCE ENCLOSED:
      1. Copy of bank statement / transaction record
      2. Copy of complaint lodged with the bank
      3. Correspondence with bank officials
      4. [Any other supporting documents]

      I affirm that the information provided is true to the best
      of my knowledge and belief.

      Sincerely,

      [Complainant Name]
      [Phone Number]
      [Email Address]
      [Full Address]

  # ── 3. Land / Property (Land Revenue Office) ──
  - id: complaint_land_revenue
    template_name: complaint_land_revenue
    title: "Complaint to Land Revenue Office — Land and Property Dispute"
    filing_body: "Land Revenue Office (Malpot Office), Ministry of Land Management"
    subject_tags:
      - land
      - property
      - land revenue
      - land dispute
      - property rights
      - malpot
    body: |-
      DATE: [dd/mm/yyyy]
      TO: The Chief Land Revenue Officer
      Land Revenue Office (Malpot Office)
      [District Name], Nepal

      RE: COMPLAINT REGARDING LAND / PROPERTY MATTER — [Plot/Kitta Number]

      RESPECTED SIR/MADAM,

      I, [Complainant Name], a citizen of Nepal residing at [Address],
      do hereby submit this complaint regarding the following land
      and property matter under the Land Revenue Act 2034 (1977) and
      the Land Reform Act 2021 (1964).

      1. PROPERTY DETAILS
         District: [District]
         VDC / Municipality: [Name]
         Ward No.: [Ward]
         Plot / Kitta No.: [Number]
         Area: [Ropani/Anna/Dhur or Sq. Meters]
         Current Registered Owner: [Name]

      2. NATURE OF COMPLAINT
         [Describe the issue — e.g., land encroachment, dispute
         over land boundary, delay in registration of deed,
         mutation (nam-sari) not processed, lost land ownership
         certificate (lal-purja), illegal transfer of land,
         dispute over inheritance, government land grab, etc.]

      3. RELEVANT DOCUMENTS IN MY POSSESSION
         [List documents — e.g., Lal Purja (land ownership
         certificate), land revenue receipt, previous deed
         copy, site map, inheritance certificate, etc.]

      4. EFFORTS MADE FOR RESOLUTION
         [Describe any previous applications made, meetings with
         land revenue officials, and the outcome]

      5. RELIEF SOUGHT
         I respectfully request the Land Revenue Office to:
         a) Investigate the above matter
